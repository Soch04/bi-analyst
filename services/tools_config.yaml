agent_services: []
  # No Cortex Agents exist

search_services: []
  # No Cortex Search Services exist

analyst_services: []
  # No semantic views or semantic YAML models exist in Snowflake

other_services:
  object_manager: False   # No ability to create/drop/alter objects
  query_manager: True     # Lets the MCP run SQL
  semantic_manager: False # No semantic views exist

sql_statement_permissions:

  - Select: True          # Core read access
  - Describe: True        # Inspect table schemas
  - Use: True             # USE DATABASE/SCHEMA
  - Create: True          # CREATE TABLE on some schemas
  - Insert: False         # Disabled — Write to tables under user ownership
  - Update: False         # Disabled — Modify data in tables
  - Delete: False         # Disabled — Data deletion
  - Drop: False           # Disabled — Dropping objects
  - Alter: False          # Disabled — Schema changes
  - TruncateTable: False  # Disabled — prevents wiping tables
  - Merge: True           # Useful for upserts
  - Command: True         # Enabled for CALL statements
  - Comment: True         # Annotate objects
  - Commit: True          # Transaction support
  - Rollback: True        # Transaction support
  - Transaction: True     # Transaction support
  - Unknown: False        # Block anything unmapped